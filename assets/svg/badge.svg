    <rdf:RDF>
      <cc:Work
         rdf:about="">
        <dc:format>image/svg+xml</dc:format>
        <dc:type
           rdf:resource="http://purl.org/dc/dcmitype/StillImage" />
        <dc:title>KHK Badge</dc:title>
        <dc:date>9/25/2017</dc:date>
        <dc:creator>
          <cc:Agent>
            <dc:title>Joseph Dailey</dc:title>
          </cc:Agent>
        </dc:creator>
        <dc:rights>
          <cc:Agent>
            <dc:title>Kappa Eta Kappa; DELTA Chpt.</dc:title>
          </cc:Agent>
        </dc:rights>
        <dc:publisher>
          <cc:Agent>
            <dc:title>Kappa Eta Kappa; National Executive Council</dc:title>
          </cc:Agent>
        </dc:publisher>
        <dc:description>The badge of the Fraternity shall consist of a hypocycloid of four cusps, the center of which shall be black and shall carry on its face the wiring diagram of a Wheatstone Bridge and vertically arranged letters KHK. The border may consist of either a plain gold stripe</dc:description>
        <dc:contributor>
          <cc:Agent>
            <dc:title>Dale Saari

Insigni described as early as February 10, 1923</dc:title>
          </cc:Agent>
        </dc:contributor>
      </cc:Work>
    </rdf:RDF>
  </metadata>
